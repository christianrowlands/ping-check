<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 108 108">
  <defs>
    <clipPath id="roundedSquare">
      <rect x="4" y="4" width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#roundedSquare)">
    <rect x="0" y="0" width="108" height="108" fill="#1C1C2A"/>

    <!-- Foreground scaled up 1.35x from center (no safe zone needed for SVG) -->
    <g transform="translate(54,54) scale(1.35) translate(-54,-54)">

      <!-- Zigzag path: outer glow -->
      <path d="M40,35 L68,46 L40,62 L68,73"
            stroke="#4DD0E1" stroke-opacity="0.06" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- Zigzag path: inner glow -->
      <path d="M40,35 L68,46 L40,62 L68,73"
            stroke="#4DD0E1" stroke-opacity="0.15" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- Zigzag path: main stroke -->
      <path d="M40,35 L68,46 L40,62 L68,73"
            stroke="#E0F7FA" stroke-width="2.8"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- Origin node: outer halo -->
      <circle cx="40" cy="35" r="10" fill="#4DD0E1" fill-opacity="0.06"/>
      <!-- Origin node: inner halo -->
      <circle cx="40" cy="35" r="7" fill="#4DD0E1" fill-opacity="0.12"/>
      <!-- Origin node: core -->
      <circle cx="40" cy="35" r="5" fill="#FFFFFF"/>

      <!-- Hop 1: halo -->
      <circle cx="68" cy="46" r="5" fill="#4DD0E1" fill-opacity="0.1"/>
      <!-- Hop 1: ring -->
      <circle cx="68" cy="46" r="3.5" fill="#B2EBF2"/>
      <!-- Hop 1: core -->
      <circle cx="68" cy="46" r="2" fill="#FFFFFF"/>

      <!-- Ping pulse: outer bloom -->
      <circle cx="54" cy="54" r="10" fill="#FFFFFF" fill-opacity="0.03"/>
      <!-- Ping pulse: inner bloom -->
      <circle cx="54" cy="54" r="7" fill="#FFFFFF" fill-opacity="0.06"/>
      <!-- Ping pulse: core -->
      <circle cx="54" cy="54" r="4" fill="#FFFFFF" fill-opacity="0.95"/>
      <!-- Ping pulse: signal ring 1 -->
      <circle cx="54" cy="54" r="14" stroke="#FFFFFF" stroke-opacity="0.1"
              stroke-width="1.2" fill="none"/>
      <!-- Ping pulse: signal ring 2 -->
      <circle cx="54" cy="54" r="18" stroke="#FFFFFF" stroke-opacity="0.06"
              stroke-width="0.8" fill="none"/>

      <!-- Hop 2: halo -->
      <circle cx="40" cy="62" r="5" fill="#4DD0E1" fill-opacity="0.1"/>
      <!-- Hop 2: ring -->
      <circle cx="40" cy="62" r="3.5" fill="#B2EBF2"/>
      <!-- Hop 2: core -->
      <circle cx="40" cy="62" r="2" fill="#FFFFFF"/>

      <!-- Destination node: outer halo -->
      <circle cx="68" cy="73" r="10" fill="#4DD0E1" fill-opacity="0.06"/>
      <!-- Destination node: inner halo -->
      <circle cx="68" cy="73" r="7" fill="#4DD0E1" fill-opacity="0.12"/>
      <!-- Destination node: core -->
      <circle cx="68" cy="73" r="5" fill="#FFFFFF"/>

    </g>
  </g>
</svg>
